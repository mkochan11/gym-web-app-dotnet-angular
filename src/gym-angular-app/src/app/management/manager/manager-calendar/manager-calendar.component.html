<div class="calendar-container">
  <div class="calendar-header">
    <h2>Weekly Schedule</h2>
    <div class="calendar-actions">
      <button pButton 
              icon="pi pi-refresh" 
              label="Refresh" 
              class="p-button-outlined"
              (click)="refreshCalendar()"
              [disabled]="isLoading">
      </button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <span class="color-indicator individual"></span>
      <span>Individual Training</span>
    </div>
    <div class="legend-item">
      <span class="color-indicator group"></span>
      <span>Group Training</span>
    </div>
    <div class="legend-item">
      <span class="color-indicator shift"></span>
      <span>Staff Shift</span>
    </div>
  </div>

  <div class="loading-spinner" *ngIf="isLoading">
    <p-progressSpinner></p-progressSpinner>
    <span>Loading trainings...</span>
  </div>

  <full-calendar [options]="calendarOptions" *ngIf="!isLoading"></full-calendar>
</div>
