<div class="calendar-layout">
  <div class="calendar-main" [class.with-details]="showDetailsPanel">
    <div class="calendar-container">
      <div class="calendar-header">
        <h2>Gym Schedule</h2>
        <div class="calendar-actions">
          <p-button 
            icon="pi pi-filter" 
            label="Clear Filters" 
            styleClass="p-button-outlined p-button-sm"
            (click)="clearFilters()"
            [disabled]="!hasActiveFilters()">
          </p-button>
          <p-button 
            icon="pi pi-refresh" 
            label="Refresh" 
            styleClass="p-button-outlined p-button-sm"
            (click)="refreshCalendar()"
            [loading]="isLoading">
          </p-button>
        </div>
      </div>

      <div class="filters-panel" *ngIf="showFilters">
        <div class="filter-group">
          <p-multiSelect 
            [options]="employeeOptions"
            [(ngModel)]="selectedEmployees"
            (onChange)="onEmployeeFilterChange()"
            placeholder="Select employees"
            optionLabel="name"
            optionValue="id" />
        </div>

        <div class="filter-group" *ngIf="config.canViewGroupTrainings">
          <p-multiSelect 
            [options]="trainingTypeOptions"
            [(ngModel)]="selectedTrainingTypes"
            (onChange)="onTrainingTypeFilterChange()"
            placeholder="Select training types"
            optionLabel="name"
            optionValue="id">
          </p-multiSelect>
        </div>

        <div class="filter-group" *ngIf="config.canViewIndividualTrainings">
          <p-multiSelect 
            [options]="clientOptions"
            [(ngModel)]="selectedClients"
            (onChange)="onClientFilterChange()"
            placeholder="Select clients"
            optionLabel="name"
            optionValue="id">
          </p-multiSelect>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item" *ngIf="config.canViewGroupTrainings" (click)="toggleEventVisibility('group')">
          <span class="color-indicator group" [class.off]="!visibleEvents.group"></span>
          <span>Group Training</span>
        </div>
        <div class="legend-item" *ngIf="config.canViewIndividualTrainings" (click)="toggleEventVisibility('individual')">
          <span class="color-indicator individual" [class.off]="!visibleEvents.individual"></span>
          <span>Individual Training</span>
        </div>
        <div class="legend-item" *ngIf="config.canViewShifts" (click)="toggleEventVisibility('shift')">
          <span class="color-indicator shift" [class.off]="!visibleEvents.shift"></span>
          <span>Staff Shift</span>
        </div>
      </div>

      <div class="loading-spinner" *ngIf="isLoading">
        <p-progressSpinner></p-progressSpinner>
        <span>Loading events...</span>
      </div>

      <full-calendar [options]="calendarOptions" *ngIf="!isLoading"></full-calendar>
    </div>
  </div>

  <div class="details-panel" [class.visible]="showDetailsPanel">
    <app-event-details
      [event]="selectedEvent"
      [eventType]="selectedEventType"
      [permissions]="getPermissionsForEvent()"
      (close)="closeDetailsPanel()"
      (edit)="onEditEvent()"
      (cancel)="onCancelEvent()"
      (delete)="onDeleteEvent()"
      (restore)="onRestoreEvent()"
      >
    </app-event-details>
  </div>
</div>
