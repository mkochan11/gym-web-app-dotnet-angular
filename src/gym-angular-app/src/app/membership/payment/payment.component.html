<div class="payment-page" *ngIf="selectedPlan">
  <div class="payment-container">
    <div class="payment-form">
      <p-button 
        label="Back to Plans" 
        icon="pi pi-arrow-left" 
        styleClass="p-button-text"
        (onClick)="goBack()">
      </p-button>

      <h1>Complete Your Purchase</h1>

      <div class="order-summary">
        <p-card header="Order Summary">
          <div class="summary-content">
            <h3>{{ selectedPlan.name }} Membership</h3>
            <p class="price">${{ selectedPlan.price }} / month</p>
            <ul class="features">
              <li *ngFor="let feature of selectedPlan.features">{{ feature }}</li>
            </ul>
          </div>
        </p-card>
      </div>

      <form [formGroup]="paymentForm" (ngSubmit)="processPayment()">
        <p-card header="Payment Details">
          <div class="form-grid">
            <div class="form-field full-width">
              <label for="cardholderName">Cardholder Name</label>
              <input 
                id="cardholderName" 
                type="text" 
                pInputText 
                formControlName="cardholderName"
                placeholder="John Doe" />
              <p-message 
                *ngIf="paymentForm.controls['cardholderName'].touched && paymentForm.controls['cardholderName'].invalid"
                severity="error" 
                text="Cardholder name is required">
              </p-message>
            </div>

            <div class="form-field full-width">
              <label for="cardNumber">Card Number</label>
              <input 
                id="cardNumber" 
                type="text" 
                pInputText 
                formControlName="cardNumber"
                placeholder="1234 5678 9012 3456" />
              <p-message 
                *ngIf="paymentForm.controls['cardNumber'].touched && paymentForm.controls['cardNumber'].invalid"
                severity="error" 
                text="Valid card number is required (16 digits)">
              </p-message>
            </div>

            <div class="form-field">
              <label for="expiryDate">Expiry Date</label>
              <input 
                id="expiryDate" 
                type="text" 
                pInputText 
                formControlName="expiryDate"
                placeholder="MM/YY" />
              <p-message 
                *ngIf="paymentForm.controls['expiryDate'].touched && paymentForm.controls['expiryDate'].invalid"
                severity="error" 
                text="Valid expiry date required (MM/YY)">
              </p-message>
            </div>

            <div class="form-field">
              <label for="cvv">CVV</label>
              <input 
                id="cvv" 
                type="text" 
                pInputText 
                formControlName="cvv"
                placeholder="123" />
              <p-message 
                *ngIf="paymentForm.controls['cvv'].touched && paymentForm.controls['cvv'].invalid"
                severity="error" 
                text="Valid CVV required">
              </p-message>
            </div>
          </div>

          <ng-template pTemplate="footer">
            <p-button 
              type="submit" 
              label="Complete Purchase" 
              icon="pi pi-lock"
              [loading]="processing"
              [disabled]="paymentForm.invalid"
              styleClass="w-full">
            </p-button>
          </ng-template>
        </p-card>
      </form>
    </div>
  </div>
</div>
