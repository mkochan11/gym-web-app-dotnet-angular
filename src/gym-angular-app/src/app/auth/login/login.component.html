<form [formGroup]="form" (ngSubmit)="submit()" class="login-form">

  <h2>Sign in</h2>

  <div class="p-field">
    <label for="email">Email</label>
    <input id="email" type="email" pInputText formControlName="email" class="w-full" />
    <p-message *ngIf="form.controls['email'].touched && form.controls['email'].invalid"
               severity="error" text="Valid email is required."></p-message>
  </div>

  <div class="p-field">
    <label for="password">Password</label>
    <p-password id="password" formControlName="password" [feedback]="false" class="w-full" inputStyleClass="w-full"></p-password>
    <p-message *ngIf="form.controls['password'].touched && form.controls['password'].invalid"
               severity="error" text="Password is required."></p-message>
  </div>

  <button pButton type="submit" [label]="loading ? 'Signing in...' : 'Sign in'" [loading]="loading"></button>

</form>
