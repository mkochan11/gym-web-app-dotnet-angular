version: "3.9"

services:
  api:
    build: 
      context: ../src/GymWebApp
      dockerfile: GymWebApp.WebAPI/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=GymDb;User=sa;Password=YourPass123!;TrustServerCertificate=True
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gym_app_db
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "YourPass123!"
      ACCEPT_EULA: "Y"
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:
